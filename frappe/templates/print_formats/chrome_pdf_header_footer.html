<!DOCTYPE html>
<html lang={{ lang }} dir={{ layout_direction }}>
	<head>
		<meta charset="utf-8">
		{% for tag in head -%}
			{{ tag | string }}
		{%- endfor %}

		<style>
			body {
				margin: 0 !important;
				border: 0 !important;
				padding: 0 !important;
			}
			/* Dont show explicit links for <a> tags */
			@media print {
				/*
				 * No body padding-top / wrapper padding here: any extra vertical
				 * space pushes the bottom of each wrapper off the page because
				 * paperHeight is calculated from the wrapper's measured height.
				 * The wkhtmltopdf-era 1mm padding shifted doc.name and pagination
				 * onto the next page on multi-page PDFs.
				 */
				.wrapper {
					box-sizing: border-box;
					padding: 0 !important;
					margin: 0 !important;
				}
				[document-status] {
					margin-bottom: 0 !important;
				}
				a[href]:after {
					content: none;
				}
				/*
				 * Prevent any child element (e.g. letterhead with wkhtmltopdf-era
				 * page-break-after:always) from splitting a single wrapper clone
				 * across multiple PDF pages.  Only the .wrapper itself carries the
				 * deliberate break-after used by _build_numbered_pages_html.
				 */
				.wrapper * {
					page-break-after: auto !important;
					break-after: auto !important;
					page-break-before: auto !important;
					break-before: auto !important;
				}
			}
		</style>
		{% for tag in styles -%}
			{{ tag | string }}
		{%- endfor %}

	</head>
	<body>
		<div class="print-format">
			<div class="wrapper">
				{% for tag in content -%}
					{{ tag | string }}
				{%- endfor %}
			</div>
		</div>
	</body>
</html>
