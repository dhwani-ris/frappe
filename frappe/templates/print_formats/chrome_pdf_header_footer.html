<!DOCTYPE html>
<html lang={{ lang }} dir={{ layout_direction }}>
	<head>
		<meta charset="utf-8">
		{% for tag in head -%}
			{{ tag | string }}
		{%- endfor %}

		<style>
			/* No body / wrapper padding: paperHeight is calculated from the wrapper's
			   measured height, so any extra vertical space pushes content off the page. */
			body {
				margin: 0 !important;
				border: 0 !important;
				padding: 0 !important;
			}
			/* overflow:hidden creates a BFC so floated letterhead children
			   (logo left / company name right) are included in the measured height.
			   Must be outside @media print: DOM.getBoxModel runs in screen mode,
			   so print-only rules don't apply during height measurement. */
			.wrapper {
				overflow: hidden;
			}
			@media print {
				.wrapper {
					box-sizing: border-box;
					padding: 0 !important;
					margin: 0 !important;
				}
				[document-status] {
					margin-bottom: 0 !important;
				}
				a[href]:after {
					content: none;
				}
				/* Block child elements from forcing a page break inside a wrapper clone. */
				.wrapper * {
					page-break-after: auto !important;
					break-after: auto !important;
					page-break-before: auto !important;
					break-before: auto !important;
				}
			}
		</style>
		{% for tag in styles -%}
			{{ tag | string }}
		{%- endfor %}

	</head>
	<body>
		<div class="print-format">
			<div class="wrapper">
				{% for tag in content -%}
					{{ tag | string }}
				{%- endfor %}
			</div>
		</div>
	</body>
</html>
