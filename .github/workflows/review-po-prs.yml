name: Review translation PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - develop
      - version-15-hotfix
      - version-16-hotfix
    paths:
      - "**/*.po"

concurrency:
  group: po-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-po-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install helper dependencies
        run: python -m pip install babel

      - name: Build PO review comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python .github/helper/po_pr_review.py

      - name: Post PO review comments
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- po-translation-review";
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const commentsFile = "po-pr-review-comments.json";
            const payload = JSON.parse(fs.readFileSync(commentsFile, "utf8"));
            const bodies = payload.comments;
            if (!Array.isArray(bodies) || bodies.length === 0) {
              core.setFailed(`${commentsFile} must contain a non-empty "comments" array`);
              return;
            }

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previousIds = existing
              .filter(
                (comment) =>
                  comment.user?.login === "github-actions[bot]" &&
                  typeof comment.body === "string" &&
                  comment.body.startsWith(marker)
              )
              .map((comment) => comment.id);

            for (const body of bodies) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

            for (const comment_id of previousIds) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id
              });
            }
